name: PlayerDataSync Plugin Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Ermöglicht den manuellen Start unter dem "Actions"-Tab bei GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew
      working-directory: .

    - name: Build with Gradle
      # Wir fangen den Output in einer Datei ab, um ihn später ans Dashboard zu senden
      run: ./gradlew :plugin:build > build.log 2>&1
      working-directory: .

    - name: Notify Bug Tracker (Success)
      if: success()
      run: |
        # Version aus der root build.gradle.kts extrahieren
        VERSION=$(grep "version =" build.gradle.kts | head -n 1 | cut -d '"' -f 2)
        CHANGELOG=$(git log -1 --pretty=%B)
        LOGS=$(cat build.log | tail -c 15000)
        
        # JSON Payload mit jq erstellen (behandelt Sonderzeichen und Zeilenumbrüche sicher)
        jq -n \
          --arg ver "v$VERSION-build-${{ github.run_number }}" \
          --arg change "$CHANGELOG" \
          --arg log "$LOGS" \
          --arg status "success" \
          '{version: $ver, changelog: $change, logs: $log, status: $status}' > payload.json

        curl -X POST "${{ secrets.DASHBOARD_URL }}/api/builds" \
          -H "Authorization: Bearer ${{ secrets.PDS_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d @payload.json

    - name: Notify Bug Tracker (Failure)
      if: failure()
      run: |
        LOGS=$(cat build.log | tail -c 15000)
        
        jq -n \
          --arg ver "build-${{ github.run_number }}-failed" \
          --arg change "Build failed at step: ${{ github.job }}" \
          --arg log "$LOGS" \
          --arg status "failed" \
          '{version: $ver, changelog: $change, logs: $log, status: $status}' > payload.json

        curl -X POST "${{ secrets.DASHBOARD_URL }}/api/builds" \
          -H "Authorization: Bearer ${{ secrets.PDS_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d @payload.json

    - name: Print Build Log on Failure
      if: failure()
      run: |
        if [ -f build.log ]; then
          cat build.log
        else
          echo "build.log not found."
        fi

    - name: Upload Build Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: PlayerDataSyncReloaded-v${{ github.run_number }}
        path: plugin/build/libs/PlayerDataSyncReloaded-*.jar
