# PlayerDataSyncReloaded Config

# Storage Settings
storage:
  type: "mysql" # mysql, mariadb, postgres, mongodb
  host: "localhost"
  port: 3306
  database: "minecraft"
  username: "root"
  password: ""
  # Connection URL for MongoDB Cloud (Atlas) or advanced setups
  connection_url: "mongodb+srv://user:pass@host/database"

# Redis Settings (Highly recommended for cross-server syncing)
redis:
  enabled: false
  host: "localhost"
  port: 6379
  password: ""
  ssl: false

# Security Settings (Safe from decoding)
security:
  # 16+ characters for AES encryption. Leave empty to disable.
  encryption_key: ""

# Sync Settings (true = sync, false = don't sync)
sync:
  inventory: true
  ender_chest: true
  health: true
  food: true
  experience: true
  potion_effects: true
  advancements: true
  statistics: true
  game_mode: true
  flight: true
  location: true
  attributes: true
  pdc: true # Persistent Data Container

# Message Settings
messages:
  prefix: "&8[&bSync&8] &r"
  sync_started: "&7Syncing your data..."
  sync_complete: "&aData synced successfully!"
  sync_failed: "&cFailed to sync your data. Please contact an admin."
